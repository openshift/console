apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-vulnerability
  namespace: aut-image-vulnerability
spec:
  selector:
    matchLabels:
      app: quarkus
  replicas: 1
  template:
    metadata:
      labels:
        app: quarkus
    spec:
      automountServiceAccountToken: false
      containers:
        - name: quarkus
          image: >-
            quay.io/redhat-appstudio-qe/quarkus:7dd062e2e8cb4ba599185e48d628b65a
          command: ["sleep", "infinity"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            exec:
              command: ["true"]
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["true"]
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
